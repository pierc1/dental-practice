name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"

jobs:
  quality:
    name: Core Quality (lint, API, UI, build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: API tests
        run: npm run test:api

      - name: UI tests
        run: npm run test:ui

      - name: Build
        run: npm run build

  db-smoke:
    name: DB Smoke Test
    runs-on: ubuntu-latest
    needs: quality

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dental_practice
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d dental_practice"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dental_practice
      RUN_DB_TESTS: "1"
      NODE_ENV: test
      ADMIN_PASSWORD: ci-admin-password

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply schema
        run: npm run db:migrate

      - name: Seed database
        run: npm run db:seed

      - name: Run DB smoke tests
        run: npm run test:db

  e2e-smoke:
    name: E2E Smoke (non-blocking)
    runs-on: ubuntu-latest
    needs: quality
    if: >-
      ${{
        github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
      }}
    continue-on-error: true
    env:
      PLAYWRIGHT_BASE_URL: ${{ vars.PLAYWRIGHT_BASE_URL || 'https://dental-practice-nyc.vercel.app' }}
      PLAYWRIGHT_ADMIN_PASSWORD: ${{ secrets.PLAYWRIGHT_ADMIN_PASSWORD }}
      PLAYWRIGHT_BOOKING_ENABLED: ${{ vars.PLAYWRIGHT_BOOKING_ENABLED }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: npm run test:e2e
